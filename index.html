<!-- index.html (Homepage) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Math Escape Rooms</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #1f2933, #020617);
      color: #e5e7eb;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
    }
    .wrap { width: 100%; max-width: 980px; }
    header {
      padding: 18px 18px 10px;
      border: 1px solid rgba(148,163,184,0.25);
      background: rgba(15,23,42,0.85);
      border-radius: 18px;
    }
    h1 {
      margin: 0;
      font-size: 1.6rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .sub {
      margin: 10px 0 0;
      color: #9ca3af;
      line-height: 1.5;
      font-size: 0.98rem;
    }
    .grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }
    .card {
      border: 1px solid rgba(148,163,184,0.25);
      background: rgba(15,23,42,0.85);
      border-radius: 18px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 160px;
    }
    .title {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 650;
    }
    .desc {
      margin: 0;
      color: #9ca3af;
      line-height: 1.5;
      font-size: 0.95rem;
      flex: 1;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    a.btn {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.95rem;
      border: 1px solid rgba(148,163,184,0.35);
      color: #0b1220;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 12px 22px rgba(22,163,74,0.25);
    }

    .footer {
      margin-top: 18px;
      padding: 16px 18px;
      border: 1px solid rgba(148,163,184,0.2);
      background: rgba(15,23,42,0.65);
      border-radius: 16px;
      text-align: center;
    }
    .footer-quote {
      font-size: 1rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: 0.02em;
    }
    .footer-note {
      margin-top: 6px;
      font-size: 0.9rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Math Escape Rooms</h1>
      <p class="sub">
      Choose your paper, lock in, and clear one challenge at a time.
      </p>
    </header>

    <section class="grid">
      <article class="card">
        <h2 class="title">S1 Mock Review</h2>
        <p class="desc"></p>
        <div class="row">
          <a class="btn" href="escape-room-3.html">Start Stats Mock Exam Review</a>
        </div>
      </article>

      <article class="card">
        <h2 class="title">Pure 3 Mock Review</h2>
        <p class="desc"></p>
        <div class="row">
          <a class="btn" href="escape-room-4.html">Start Pure 3 Mock Exam Review</a>
        </div>
      </article>

      <article class="card">
        <h2 class="title">Mechanics Review</h2>
        <p class="desc"></p>
        <div class="row">
          <a class="btn" href="escape-room-5.html">Start Mechanics Mock Exam Review</a>
        </div>
      </article>

      <article class="card">
        <h2 class="title">Pure 1 Mock Review</h2>
        <p class="desc"></p>
        <div class="row">
          <a class="btn" href="escape-room-6.html">Start Pure 1 Mock Exam Review</a>
        </div>
      </article>
    </section>

    <div class="footer">
      <div class="footer-quote" id="footer-quote"></div>
      <div class="footer-note" id="footer-note"></div>
    </div>
  </div>

  <script>
    const coachQuotes = [
      "Discipline is choosing what you want most over what you want now.",
      "Pressure is a privilege.",
      "One more rep. One more mark. One more win.",
      "You do not rise to the occasion. You fall to your level of preparation.",
      "Lock in and trust your training.",
      "Winners do the boring things better.",
      "Focus on the next move, not the whole mountain.",
      "Stay calm. Be sharp. Finish strong.",
      "Confidence comes from preparation.",
      "Get comfortable being uncomfortable.",
      "Small steps, repeated, become domination.",
      "The standard is the standard.",
      "Effort is a choice.",
      "You are closer than you think.",
      "Train your mind to stay when it gets hard.",
      "Sharp minds finish papers well.",
      "Every solved question is proof you’re improving.",
      "Composure creates marks.",
      "Make the hard parts your advantage.",
      "Keep going. That’s where the edge is."
    ];

    const footerNotes = [
      "Choose your room and go to work.",
      "Accuracy first. Speed second.",
      "One page. One lock. One win.",
      "Stay calm and trust your method.",
      "Build marks through clean working."
    ];

    document.getElementById("footer-quote").textContent =
      coachQuotes[Math.floor(Math.random() * coachQuotes.length)];

    document.getElementById("footer-note").textContent =
      footerNotes[Math.floor(Math.random() * footerNotes.length)];
  </script>
</body>
</html>
